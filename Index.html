  <title>Biashara Yangu</title>

<body>

  <header>
    <h1>Biashara Yangu</h1>
    <p>Simamia biashara yako kirahisi</p>

  <section class="card">

  <section class="card">

    <ul id="list"></ul>
    <h3 Jumla: <span id="total">0</span> TZS</h3>
